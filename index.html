<!doctype html>
<html lang="en">
  <head>
    <!-- ===== ESSENTIAL META TAGS ===== -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== FAVICON & BRANDING ===== -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <meta name="theme-color" content="#000000" />

    <!-- ===== SEO META TAGS ===== -->
    <title>Books Online Bookstore | Fiction, Sci-Fi & History Books</title>
    <meta
      name="description"
      content="Books is an online bookstore offering a wide selection of fiction, sci-fi, and history books. Enjoy a seamless and modern shopping experience."
    />
    <meta
      name="keywords"
      content="書籍,電商,在線購物,文學,科幻小說,圖書館,書店,books,bookstore,fiction,sci-fi,history"
    />
    <meta name="author" content="zem860" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://zem860.github.io/map/" />

    <!-- ===== OPEN GRAPH TAGS (Social Media Sharing) ===== -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="MAP Online Bookstore - Fiction, Sci-Fi & History"
    />
    <meta
      property="og:description"
      content="Discover a curated collection of books across multiple genres. Shop fiction, science fiction, history, and young adult titles with worldwide shipping."
    />
    <meta property="og:url" content="https://zem860.github.io/map/" />
    <meta
      property="og:image"
      content="https://zem860.github.io/map/og-image.jpg"
    />
    <meta property="og:image:alt" content="MAP Online Bookstore Logo" />
    <meta property="og:site_name" content="MAP Online Bookstore" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_TW" />

    <!-- ===== TWITTER CARD TAGS ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MAP Online Bookstore - Fiction, Sci-Fi & History"
    />
    <meta
      name="twitter:description"
      content="Discover a curated collection of books across multiple genres. Shop fiction, science fiction, history, and young adult titles."
    />
    <meta
      name="twitter:image"
      content="https://zem860.github.io/map/og-image.jpg"
    />

    <!-- ===== ADDITIONAL SEO ===== -->
    <!-- Prevent automatic detection of phone numbers on mobile devices -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
